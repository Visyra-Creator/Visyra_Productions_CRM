- tapOn: "OK"
- tapOn: "Search leads..."
- inputText: "QA_LEAD_AUTOMATION"
- assertVisible: "QA_LEAD_AUTOMATION"
# Failure validation: required fields
- tapOn: "Add Lead"
- tapOn: "Add Lead"
- assertVisible: "Warning"
- tapOn: "OK"

